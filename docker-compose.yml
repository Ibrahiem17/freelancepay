version: "3.8"

services:
  postgres:
    image: postgres:15
    container_name: freelancepay_postgres
    environment:
      POSTGRES_DB: freelancepay
      POSTGRES_USER: freelancepay_user
      POSTGRES_PASSWORD: freelancepay_pass
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freelancepay_user -d freelancepay"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4
    container_name: freelancepay_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@freelancepay.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
