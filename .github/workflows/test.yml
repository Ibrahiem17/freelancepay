name: Tests

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Run unit tests
        working-directory: app/frontend
        env:
          JWT_SECRET: test-secret-32-chars-minimum-ok-long
          NODE_ENV: test
        run: npm test -- --coverage --passWithNoTests --testPathPatterns="__tests__/(utils|indexer)"

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: app/frontend/coverage/

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    # E2E tests require a real DATABASE_URL — skip in forks or when secret is absent
    if: ${{ vars.RUN_E2E == 'true' || github.repository_owner == 'Ibrahiem17' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app/frontend/package-lock.json

      - name: Install dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: app/frontend
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        working-directory: app/frontend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret-32-chars-minimum-ok-long' }}
          NEXT_PUBLIC_CLUSTER: devnet
        run: npm run dev &

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 60000

      - name: Run API integration tests
        working-directory: app/frontend
        env:
          JWT_SECRET: test-secret-32-chars-minimum-ok-long
          NODE_ENV: test
        run: npm test -- --passWithNoTests --testPathPatterns="__tests__/api"

      - name: Run E2E tests
        working-directory: app/frontend
        env:
          CI: true
          BASE_URL: http://localhost:3000
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: app/frontend/playwright-report/
